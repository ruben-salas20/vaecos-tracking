{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="banner {{ 'info' if category == 'ok' else 'danger' if category == 'error' else 'warn' }}" style="margin-bottom:12px;">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
