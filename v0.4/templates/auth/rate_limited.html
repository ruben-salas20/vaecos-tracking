<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demasiados intentos — VAECOS</title>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('vaecos.theme');
        var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="login-page">
<div class="login-card">
  <div class="login-brand">
    <div class="brand-mark" style="width:32px;height:32px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </div>
    <div>
      <div style="font-weight:700;font-size:16px;">VAECOS Tracking</div>
    </div>
  </div>
  <div class="banner danger" style="margin-bottom:16px;">
    <strong>Demasiados intentos.</strong>
    Esperá un minuto y volvé a probar.
  </div>
  <div class="muted" style="font-size:12px;margin-bottom:12px;">{{ message | e }}</div>
  <a href="{{ url_for('auth.login') }}" class="btn primary" style="width:100%;text-align:center;">Volver al login</a>
</div>
</body>
</html>
