<!doctype html>
<html lang="es" data-theme="light" data-density="default">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VAECOS Tracking — PDF</title>
  <link rel="stylesheet" href="app/styles.css">
  <style>
    @page { size: 1480px 1100px; margin: 0; }
    html, body { background: #fff !important; }
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    .print-page {
      width: 1480px;
      min-height: 1080px;
      page-break-after: always;
      break-after: page;
      background: var(--bg);
      display: grid;
      grid-template-columns: 232px minmax(0, 1fr);
      box-shadow: 0 0 0 1px var(--border);
      position: relative;
    }
    .print-page:last-child { page-break-after: auto; break-after: auto; }
    .print-page .sidebar { position: static !important; height: auto !important; min-height: 1080px; }
    .print-page .main { padding: 24px 32px 36px; max-width: none; }
    .print-label {
      position: absolute;
      top: 8px; right: 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 5;
    }

    /* Hide tweaks panel + spinners (static print) */
    .tweaks-panel, .tweaks-toggle { display: none !important; }
    .spinner { animation: none !important; border-top-color: var(--brand) !important; }
    .dots-anim::after { content: '' !important; animation: none !important; }

    @media print {
      .print-page { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="app/data.js"></script>
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/layout.jsx"></script>
  <script type="text/babel" src="app/screen-centro.jsx"></script>
  <script type="text/babel" src="app/screen-attention.jsx"></script>
  <script type="text/babel" src="app/screen-analytics.jsx"></script>
  <script type="text/babel" src="app/screen-rest.jsx"></script>
  <script type="text/babel" src="app/screen-extras.jsx"></script>
  <script type="text/babel">
    function PrintAll() {
      const screens = [
        { id: "centro",     label: "01 · Centro Operativo",      C: window.CentroOperativo },
        { id: "attention",  label: "02 · Requiere Atención",     C: window.Attention },
        { id: "analytics",  label: "03 · Analytics",             C: window.Analytics },
        { id: "porrecoger", label: "04 · Por Recoger en Oficina", C: window.PorRecoger },
        { id: "history",    label: "05 · Historial de Corridas", C: window.HistorialCorridas },
        { id: "runs",       label: "06 · Detalle de Corrida",    C: window.DetalleCorrida },
        { id: "guide",      label: "07 · Detalle de Guía",       C: window.GuideDetail },
        { id: "client",     label: "08 · Detalle de Cliente",    C: window.ClientDetail },
        { id: "progress",   label: "09 · Progreso en Vivo",      C: window.RunProgress },
        { id: "newrun",     label: "10 · Nueva Corrida",         C: window.NuevaCorrida },
        { id: "rules",      label: "11 · Reglas",                C: window.Reglas },
      ];
      const noop = () => {};
      return (
        <>
          {screens.map(s => (
            <div className="print-page" key={s.id}>
              <div className="print-label">{s.label}</div>
              <Sidebar current={s.id} onNav={noop}/>
              <main className="main">
                <s.C onNav={noop} guia="" cliente=""/>
              </main>
            </div>
          ))}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PrintAll/>);

    // Auto-print after fonts + Babel + render settle
    function triggerPrint() {
      setTimeout(() => window.print(), 800);
    }
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(triggerPrint);
    } else {
      setTimeout(triggerPrint, 1500);
    }
  </script>
</body>
</html>
